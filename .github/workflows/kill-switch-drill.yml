name: Scheduled kill-switch drill

on:
  schedule:
    # Binding operator-calendar slot: first day of each month, 06:00 UTC.
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: scheduled-kill-switch-drill
  cancel-in-progress: false

jobs:
  drill:
    name: Baseline reversion and golden-turn restoration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      KILL_SWITCH_DRILL_SCOPE: synthetic-ci
      KILL_SWITCH_DRILL_DEVICE_ID: ci-scheduled-kill-switch
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build protocol golden-turn contracts
        run: pnpm exec turbo run build --filter=@moolam/sync-protocol

      - name: Build learning kill-switch contracts
        run: pnpm exec turbo run build --filter=@moolam/learning

      - name: One-operation baseline reversion and golden restoration drill
        run: node --test packages/learning/tests/kill_switch_orchestrator.test.mjs

      - name: Production-path golden-turn replay
        run: pnpm --filter @moolam/runtime-harness golden:replay

      - name: Page on-call on drill failure
        if: ${{ failure() }}
        env:
          PAGER_WEBHOOK_URL: ${{ secrets.KILL_SWITCH_PAGER_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$PAGER_WEBHOOK_URL" ]; then
            echo "::error::KILL_SWITCH_PAGER_WEBHOOK_URL is not configured"
            exit 1
          fi
          payload="$(jq -n \
            --arg event "kill_switch_drill_failed" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runUrl "$RUN_URL" \
            --arg commit "$GITHUB_SHA" \
            '{event:$event,severity:"P0",repository:$repository,runId:$runId,runUrl:$runUrl,commit:$commit}')"
          curl --fail-with-body --retry 2 --max-time 15 \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "$PAGER_WEBHOOK_URL"

      - name: Open or update drill incident
        if: ${{ failure() }}
        uses: actions/github-script@v7
        env:
          ON_CALL_LOGIN: ${{ vars.KILL_SWITCH_ON_CALL_GITHUB }}
        with:
          script: |
            const title = "[P0] Scheduled kill-switch drill failed";
            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const body = [
              "The scheduled kill-switch drill failed.",
              "",
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              "Scope: synthetic-ci (no learner content)",
              "",
              "Keep learned flags disabled and follow docs/learning/KILL_SWITCH_RUNBOOK.md.",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = open.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              const assignee = process.env.ON_CALL_LOGIN?.trim();
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                ...(assignee ? { assignees: [assignee] } : {}),
              });
            }
