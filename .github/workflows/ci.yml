name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript build, typecheck, protocol smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Package unit tests
        run: pnpm -r --filter "./packages/**" --filter "!./packages/cloud-orchestrator" run test

      - name: CRDT algebra smoke test (TypeScript)
        run: node packages/sync-protocol/smoke_test.mjs

      - name: Examples run end to end
        run: pnpm --filter @moolam/examples run test

  python:
    name: Python engine, contract mirror, CRDT parity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cloud-orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall src

      - name: CRDT algebra smoke test (Python)
        run: python smoke_test.py

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commits are signed off
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            commits=$(git rev-list --no-merges "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || [ -z "$before" ]; then
              commits=$(git rev-list --no-merges HEAD)
            elif git merge-base --is-ancestor "$before" "${{ github.sha }}" 2>/dev/null; then
              commits=$(git rev-list --no-merges "$before..${{ github.sha }}")
            else
              # Force-push or history rewrite: before is not an ancestor of HEAD
              commits=$(git rev-list --no-merges HEAD)
            fi
          fi
          missing=0
          for sha in $commits; do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: '; then
              echo "::error::Commit $sha is missing Signed-off-by (use git commit -s)"
              missing=1
            fi
          done
          exit "$missing"
