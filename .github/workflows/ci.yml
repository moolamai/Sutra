name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commits are signed off
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            commits=$(git rev-list --no-merges "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || [ -z "$before" ]; then
              commits=$(git rev-list --no-merges HEAD)
            elif git merge-base --is-ancestor "$before" "${{ github.sha }}" 2>/dev/null; then
              commits=$(git rev-list --no-merges "$before..${{ github.sha }}")
            else
              # Force-push or history rewrite: before is not an ancestor of HEAD
              commits=$(git rev-list --no-merges HEAD)
            fi
          fi
          missing=0
          for sha in $commits; do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: '; then
              echo "::error::Commit $sha is missing Signed-off-by (use git commit -s)"
              missing=1
            fi
          done
          exit "$missing"


  build-test-typescript:
    name: Build & test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3


      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Build all packages
        run: pnpm build


      - name: Typecheck all packages
        run: pnpm typecheck


      - name: Package unit tests
        run: |
          pnpm -r --workspace-concurrency=4 --filter "./packages/**" --filter "!./packages/cloud-orchestrator" run test


      - name: Training gym scenario gates
        run: |
          pnpm --filter @moolam/training-gym guidance:check
          pnpm --filter @moolam/training-gym golden:check
          pnpm --filter @moolam/training-gym catalog:check
          pnpm --filter @moolam/training-gym catalog:smoke
          pnpm --filter @moolam/training-gym test


      - name: Training corpus manifest schema
        run: pnpm --filter @moolam/training-corpus test


      - name: C4 micro-run fixture set (model + corpus + gym)
        run: |
          pnpm --filter @moolam/training-pipeline fixtures:check
          pnpm --filter @moolam/training-pipeline fixtures:prove
          pnpm --filter @moolam/training-pipeline fixtures:test


      - name: CRDT algebra smoke test (TypeScript)
        run: node packages/sync-protocol/smoke_test.mjs


      - name: Install cloud-orchestrator (Python schema export for drift gate)
        working-directory: packages/cloud-orchestrator
        run: pip install -e .


      - name: Schema drift unit tests
        run: node --test --test-concurrency=1 scripts/check-schema-drift.test.mjs scripts/prove-schema-drift-gate.test.mjs scripts/check-package-publish-readiness.test.mjs scripts/prove-guidance-eval-gate.test.mjs scripts/check-field-pilot-kit.test.mjs scripts/run-field-pilot-execution.test.mjs scripts/check-field-pilot-findings.test.mjs scripts/check-field-pilot-exit-review.test.mjs scripts/check-threat-model-inventory.test.mjs scripts/check-threat-model-stride.test.mjs scripts/check-training-extended-ci.test.mjs


      - name: Field pilot execution (two-week matrix)
        run: pnpm field-pilot:execute


      - name: Field pilot findings → freeze RFC packaging
        run: pnpm field-pilot:findings:check


      - name: Field pilot exit review (privacy + markSynced + routing)
        run: pnpm field-pilot:exit-review


      - name: Examples run end to end
        run: pnpm --filter @moolam/examples run test


      - name: Examples mock migration (no _shared duplicate)
        run: node --test scripts/check-examples-mock-migration.test.mjs


      - name: Performance guardrails (core loop + sync round-trip)
        run: |
          set -euo pipefail
          pnpm --filter @moolam/benchmarks run core-loop
          pnpm --filter @moolam/benchmarks run sync-roundtrip
        env:
          CI: true

  build-test-python:
    name: Build & test (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cloud-orchestrator
    steps:
      - uses: actions/checkout@v4


      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip


      - name: Install package with dev extras
        run: pip install -e ".[dev]"


      - name: Compile check
        run: python -m compileall src


      - name: CRDT algebra smoke test (Python)
        run: python smoke_test.py


      - name: Pytest contract + exporter suites (PR fast)
        run: pytest -q -m "not compose and not slow"


      - name: Golden joins (Python)
        working-directory: packages/cloud-orchestrator
        run: pytest -q --tb=short tests/test_golden_joins.py

  protocol-conformance:
    name: Protocol & conformance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Python package (pydantic)
        working-directory: packages/cloud-orchestrator
        run: pip install -e ".[dev]"

      - name: Install Python package (pydantic)
        working-directory: packages/cloud-orchestrator
        run: pip install -e ".[dev]"


      - name: Schema drift gate
        run: node scripts/check-schema-drift.mjs


      - name: Trajectory schema drift gate
        run: pnpm --filter @moolam/learning schemas:check


      - name: Baseline registry completeness gate
        run: pnpm --filter @moolam/learning baselines:check


      - name: Eval slice coverage completeness gate
        run: pnpm --filter @moolam/learning slices:check


      - name: Candidate red-team pre-gate (constitutional erosion fixtures)
        run: pnpm --filter @moolam/learning red-team:check


      - name: One-surgery promotion lint prove
        run: pnpm --filter @moolam/learning surgery:check


      - name: Hack suite critic-version gate (before calibration)
        run: pnpm --filter @moolam/learning hack:check


      - name: LLM-judge policy governance coherence
        run: pnpm --filter @moolam/learning llm-judge-policy:check


      - name: LLM-judge agreement gate (tone/clarity held-out)
        run: pnpm --filter @moolam/learning llm-judge-gate:check


      - name: Critic calibration promotion gate
        run: pnpm --filter @moolam/learning calibration:check


      - name: Prove gate red→green (seeded Pydantic drift)
        run: node scripts/prove-schema-drift-gate.mjs


      - name: PROTOCOL_VERSION bump gate (wire change ⇒ changelog + version)
        run: node scripts/check-protocol-version-bump.mjs


      - name: Prove PROTOCOL_VERSION bump gate red→green (unlogged field)
        run: node scripts/prove-protocol-version-bump-gate.mjs


      - name: PROTOCOL_VERSION bump gate unit tests
        run: node --test scripts/check-protocol-version-bump.test.mjs


      - name: Install Python package (dev extras)
        working-directory: packages/cloud-orchestrator
        run: pip install -e ".[dev]"


      - name: Build sync-protocol
        run: pnpm exec turbo run build --filter=@moolam/sync-protocol


      - name: Golden joins (TypeScript)
        run: node --test packages/sync-protocol/tests/golden_joins.test.mjs


      - name: Prove gate red→green (seeded expectedJoin drift)
        run: pnpm golden:joins:prove


      - name: Golden turns (reference parser stub)
        run: pnpm golden:turns


      - name: Prove gate red→green (seeded expectedFrames drift + unified diff)
        run: pnpm golden:turns:prove
        env:
          CI: true


      - name: Golden-turn prove unit tests
        run: node --test scripts/prove-golden-turns-gate.test.mjs


      - name: Build runtime-harness
        run: pnpm exec turbo run build --filter=@moolam/runtime-harness


      - name: Chunk-boundary fuzz (exhaustive + seeded random splits)
        run: pnpm golden:fuzz
        env:
          CI: true


      - name: Prove gate red→green (seeded chunk drift + unified diff)
        run: pnpm golden:fuzz:prove
        env:
          CI: true


      - name: Chunk-fuzz prove unit tests
        run: node --test scripts/prove-parser-chunk-fuzz-gate.test.mjs
        env:
          CI: true


      - name: Build bindings-slm
        run: pnpm exec turbo run build --filter=sutra-bindings-slm


      - name: Rollback drill (champion baseline ↔ challenger ↔ byte-identical restore)
        run: node --experimental-strip-types --test training/delivery/rollback_drill.test.ts
        env:
          CI: true


      - name: Conformance gate (suite + runtime refs + CLI)
        run: pnpm conformance
        env:
          CI: true


      - name: Prove gate red→green (seeded durability violation)
        run: pnpm conformance:prove
        env:
          CI: true


      - name: Conformance prove unit tests
        run: node --test scripts/prove-conformance-gate.test.mjs
        env:
          CI: true


      - name: Conformance quickstart doc consistency
        run: node --test scripts/check-conformance-quickstart.test.mjs


      - name: Mock conformance gate (full suite × contract-mocks)
        run: pnpm mocks:conformance
        env:
          CI: true


      - name: Prove mock gate red→green (seeded oversized vision)
        run: pnpm mocks:conformance:prove
        env:
          CI: true


      - name: Mock conformance prove unit tests
        run: node --test scripts/prove-mock-conformance-gate.test.mjs
        env:
          CI: true


      - name: Build contract-conformance locality harness
        run: pnpm exec turbo run build --filter=@moolam/contract-conformance


      - name: Learning locality gate (obligation ID + egress attempt log)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/learning-locality
          node --test packages/contract-conformance/dist/locality/learning_paths.test.js 2>&1 \
            | tee artifacts/learning-locality/gate.log
        env:
          CI: true


      - name: Upload learning locality log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learning-locality-log-${{ github.run_id }}
          path: artifacts/learning-locality/gate.log
          if-no-files-found: warn


      - name: Build runtime-harness (transitive workspace deps)
        run: pnpm exec turbo run build --filter=@moolam/runtime-harness


      - name: Forced-outage drills (stubbed dependencies)
        run: pnpm --filter @moolam/runtime-harness run test:degradation-drills
        env:
          CI: true


      - name: Registry alignment gate (behavior + signal vs A P6 doc)
        run: node packages/runtime-harness/test/degradation_drills/registry_alignment_gate.mjs --check
        env:
          CI: true


      - name: Prove gate red→green (seeded signal drift + unified diff)
        run: node packages/runtime-harness/test/degradation_drills/registry_alignment_gate.mjs
        env:
          CI: true


      - name: Alignment gate unit tests
        run: node --test packages/runtime-harness/test/degradation_drills/registry_alignment_gate.test.mjs
        env:
          CI: true


      - name: Detect training/gym or runtime-harness path changes
        id: parity_paths
        run: |
          set -euo pipefail
          node training/gym/scripts/detect-parity-ci-paths.mjs \
            --event "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head "${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"


      - name: Build runtime-harness (transitive workspace deps)
        if: steps.parity_paths.outputs.run == 'true'
        run: pnpm exec turbo run build --filter=@moolam/runtime-harness


      - name: Replay parity gate (first divergent frameIndex on fail)
        if: steps.parity_paths.outputs.run == 'true'
        run: |
          set -euo pipefail
          mkdir -p artifacts/gym-replay-parity
          pnpm --filter @moolam/training-gym run ci:parity 2>&1 | tee artifacts/gym-replay-parity/gate.log


      - name: Replay parity unit suite
        if: steps.parity_paths.outputs.run == 'true'
        run: |
          set -euo pipefail
          pnpm exec turbo run build --filter=@moolam/runtime-harness
          pnpm exec turbo run build --filter=@moolam/learning
          node --experimental-strip-types --test training/gym/tests/replay_parity.test.ts


      - name: Skip notice when paths untouched
        if: steps.parity_paths.outputs.run != 'true'
        run: |
          echo "gym-replay-parity skipped — no changes under training/gym/ or packages/runtime-harness/"
          echo "matched=${{ steps.parity_paths.outputs.matched }}"


      - name: Upload parity gate log
        if: always() && steps.parity_paths.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gym-replay-parity-log
          path: artifacts/gym-replay-parity/
          if-no-files-found: ignore


