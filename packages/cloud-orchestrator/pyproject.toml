[project]
name = "sutra-orchestrator"
version = "0.1.0"
description = "The Cloud Harness. Reference Cognitive State Machine engine for the Hybrid Cognitive Sync Protocol: FastAPI + LangGraph + pgvector."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Moolam AI" }]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "langgraph>=0.3",
    "langchain-core>=0.3",
    "psycopg[binary,pool]>=3.2",
    "pgvector>=0.3",
    "redis>=5.2",
    "numpy>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.25", "httpx>=0.28", "ruff>=0.9", "mypy>=1.14"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sutra_orchestrator"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
strict = true
